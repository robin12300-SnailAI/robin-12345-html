<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub 协作共享页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f1115;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      gap: 2rem;
      padding: 2rem;
    }
    h1 {
      color: #e0e0e0;
      font-size: clamp(1.5rem, 5vw, 3rem);
      letter-spacing: 0.05em;
      text-align: center;
    }
    .names {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
    }
    .name-tag {
      font-size: clamp(1.2rem, 4vw, 2rem);
      font-weight: 700;
      padding: 0.5rem 1.5rem;
      border-radius: 12px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .name-tag:hover {
      transform: translateY(-4px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .name-robin { color: #ff6b6b; background: rgba(255,107,107,0.1); border: 2px solid rgba(255,107,107,0.3); }
    .name-serene { color: #74b9ff; background: rgba(116,185,255,0.1); border: 2px solid rgba(116,185,255,0.3); }
    .name-zrr168 { color: #4CAF50; background: rgba(76,175,80,0.15); border: 2px solid rgba(76,175,80,0.5); box-shadow: 0 0 15px rgba(76,175,80,0.2); }
    .name-jiangpei { color: #ffa502; background: rgba(255,165,2,0.1); border: 2px solid rgba(255,165,2,0.3); }
    .subtitle {
      color: #888;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>GitHub 协作共享页</h1>
  <div class="names">
    <a class="name-tag name-robin" href="https://github.com/robin12300-SnailAI" target="_blank">罗斌 12345</a>
    <a class="name-tag name-serene" href="https://github.com/serene" target="_blank">serene 12345</a>
    <a class="name-tag name-zrr168" href="https://github.com/ZRR168" target="_blank">ZRR168 12345</a>
    <a class="name-tag name-jiangpei" href="https://github.com/jiangpei555" target="_blank">jiangpei555</a>
  </div>
  <p class="subtitle">这个页面由 4 位协作者共同维护 · 点击名字访问 GitHub</p>
</body>
</html>
